# SPDX-License-Identifier: MIT
# Erebine Agent - NVIDIA GPU Stack
#
# Deploys a EIM GPU node with vLLM native CPU KV cache offloading.
# See internal-docs/configuration/kv-offloading.md for details.
#
# QUICK START:
#   1. Get a join key from your Erebine dashboard:
#      Dashboard -> Infrastructure -> Agents -> Generate Join Key
#
#   2. Create host directories with correct permissions:
#      sudo mkdir -p /data/erebine/models /data/erebine/config /data/erebine/vllm-cache
#      sudo chown -R 5152:5152 /data/erebine
#
#   3. Set environment variables or create a .env file:
#      export EREBINE_AGENT_JOIN_KEY=ejk_your_key_here
#
#   4. Start the agent:
#      sudo -E podman compose -f compose.agent-nvidia.yaml up -d
#
# ENROLLMENT WORKFLOW:
#   - On first start, the agent enrolls using your join key
#   - Enrollment state is persisted to /data/erebine/config
#   - On subsequent restarts, the agent reconnects automatically
#   - You can remove EREBINE_AGENT_JOIN_KEY after successful enrollment
#
# ENVIRONMENT VARIABLES:
#   EREBINE_AGENT_JOIN_KEY                         [REQUIRED] Join key from Erebine dashboard (first run only)
#   EREBINE_AGENT_MAX_CONCURRENT                   Optional ceiling for concurrent requests (auto-configured when not set)
#   EREBINE_AGENT_TENSOR_PARALLEL_SIZE             Tensor parallel size for multi-GPU (default: 1)
#   EREBINE_AGENT_GPU_MEMORY_UTILIZATION           GPU memory utilization fraction (default: 0.90)
#   EREBINE_AGENT_MAX_MODEL_LEN                    Maximum sequence length (default: model default)
#   EREBINE_AGENT_MODEL_CACHE_MAX_SIZE_GB          Local model cache size in GB (default: 100)
#   EREBINE_AGENT_LOG_LEVEL                        Logging level: trace, debug, info, warning, error (default: info)
#   EREBINE_AGENT_VLLM_DISABLE_CUSTOM_ALL_REDUCE   Force disable custom reduce (default: "true")
#   EREBINE_AGENT_MAX_MODEL_LEN                    Maximum sequence length (default: model default)
#   SHM_SIZE                                        Shared memory size in bytes (default: 8589934592 = 8GB)
#
# KERNEL SOCKET BUFFER TUNING (optional):
#   The agent sets ZeroMQ socket buffers to 4 MiB for streaming throughput.
#   Linux defaults net.core.wmem_max and net.core.rmem_max to 212992 bytes,
#   which silently caps the requested buffer size. The agent will attempt to
#   raise these limits on startup (requires privileged mode or CAP_SYS_ADMIN).
#
#   If the container is not privileged, set these on the host before starting:
#     sudo sysctl -w net.core.wmem_max=4194304
#     sudo sysctl -w net.core.rmem_max=4194304
#
#   To persist across reboots, add to /etc/sysctl.d/99-erebine.conf:
#     net.core.wmem_max = 4194304
#     net.core.rmem_max = 4194304

services:
  agent:
    image: ${DOCKER_REGISTRY:-ghcr.io/erebine/container-agents}/eim-vllm-cuda:${VERSION:-latest}
    container_name: eim-vllm-cuda
    network_mode: host
    ipc: host
    privileged: true
    shm_size: ${SHM_SIZE:-90g}
    # For Docker Compose v2.3+ with NVIDIA Container Toolkit, use the following deploy section to request GPUs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    volumes:
      # Persistent model cache
      - /data/erebine/models:/var/lib/inference/.cache/erebine/models
      # Persistent vLLM compile/JIT cache (VLLM_CACHE_ROOT) -- avoids repaying warmup on restart
      - /data/erebine/vllm-cache:/var/lib/inference/.cache/erebine/vllm
      # Persistent enrollment state
      - /data/erebine/config:/var/lib/inference/.config/erebine
    environment:
      # Agent Enrollment [REQUIRED for first run]
      EREBINE_AGENT_JOIN_KEY: "${EREBINE_AGENT_JOIN_KEY:-}"
      # Model is assigned from the dashboard during enrollment
      EREBINE_AGENT_LOG_LEVEL: "${EREBINE_AGENT_LOG_LEVEL:-info}"
      EREBINE_AGENT_VLLM_DISABLE_CUSTOM_ALL_REDUCE: "true"
    restart: unless-stopped
