# SPDX-License-Identifier: MIT
# Erebine Agent - AMD GPU ROCm Stack
#
# Deploys a EIM AMD GPU node using ROCm with vLLM native CPU KV cache
# offloading. See internal-docs/configuration/kv-offloading.md for details.
#
# QUICK START:
#   1. Get a join key from your Erebine dashboard:
#      Dashboard -> Infrastructure -> Agents -> Generate Join Key
#
#   2. Create host directories with correct permissions:
#      sudo mkdir -p /data/erebine/models /data/erebine/config
#      sudo chown -R 5152:5152 /data/erebine
#
#   3. Set environment variables or create a .env file:
#      export EREBINE_AGENT_JOIN_KEY=ejk_your_key_here
#
#   4. Start the agent:
#      sudo -E podman compose -f docker-compose.agent-amd-rocm.yaml up -d
#
# PREREQUISITES:
#   - AMD GPU with ROCm support (MI210, MI250, MI300, RX 7900, etc.)
#   - ROCm driver installed on the host
#   - /dev/kfd and /dev/dri devices available
#   - User in video and render groups on the host
#
# ENROLLMENT WORKFLOW:
#   - On first start, the agent enrolls using your join key
#   - Enrollment state is persisted to /data/erebine/config
#   - On subsequent restarts, the agent reconnects automatically
#   - You can remove EREBINE_AGENT_JOIN_KEY after successful enrollment
#
# ENVIRONMENT VARIABLES:
#   EREBINE_AGENT_JOIN_KEY              [REQUIRED] Join key from Erebine dashboard (first run only)
#   HIP_VISIBLE_DEVICES                  GPU device indices to expose to the HIP runtime
#                                        (default: unset, meaning every GPU the container is
#                                        given). Set it only to restrict the agent to a subset,
#                                        and list every device it may use (e.g. "0,1"). A value
#                                        naming fewer GPUs than the container holds caps the
#                                        agent at that subset: tensor parallelism can never
#                                        exceed the devices HIP exposes.
#   EREBINE_AGENT_MAX_CONCURRENT        Optional ceiling for concurrent requests (auto-configured when not set)
#   EREBINE_AGENT_TENSOR_PARALLEL_SIZE  Tensor parallel size for multi-GPU (default: unset,
#                                        derived from the GPUs the HIP runtime exposes). Set it
#                                        only to override auto-configuration; a value wider than
#                                        the visible GPU count fails the vLLM worker at startup.
#   EREBINE_AGENT_GPU_MEMORY_UTILIZATION GPU memory utilization fraction (default: 0.90)
#   EREBINE_AGENT_MAX_MODEL_LEN         Maximum sequence length (default: model default)
#   EREBINE_AGENT_MODEL_CACHE_MAX_SIZE_GB Local model cache size in GB (default: 100)
#   EREBINE_AGENT_LOG_LEVEL             Logging level: trace, debug, info, warning, error (default: info)
#   SHM_SIZE                             Shared memory size in bytes (default: 8589934592 = 8GB)
#
# KERNEL SOCKET BUFFER TUNING (optional):
#   The agent sets ZeroMQ socket buffers to 4 MiB for streaming throughput.
#   Linux defaults net.core.wmem_max and net.core.rmem_max to 212992 bytes,
#   which silently caps the requested buffer size. The agent will attempt to
#   raise these limits on startup (requires privileged mode or CAP_SYS_ADMIN).
#
#   If the container is not privileged, set these on the host before starting:
#     sudo sysctl -w net.core.wmem_max=4194304
#     sudo sysctl -w net.core.rmem_max=4194304
#
#   To persist across reboots, add to /etc/sysctl.d/99-erebine.conf:
#     net.core.wmem_max = 4194304
#     net.core.rmem_max = 4194304

services:
  agent:
    image: ${DOCKER_REGISTRY:-ghcr.io/erebine/container-agents}/eim-vllm-rocm:${VERSION:-latest}
    container_name: eim-vllm-rocm
    network_mode: host
    ipc: host
    privileged: true
    shm_size: ${SHM_SIZE:-90g}
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
      - /dev/mem:/dev/mem
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_PTRACE
      - CAP_SYS_ADMIN
    group_add:
      - video
      - render
    volumes:
      # Persistent model cache
      - /data/erebine/models:/var/lib/inference/.cache/erebine/models
      # Persistent vLLM compile/JIT cache (VLLM_CACHE_ROOT) -- avoids repaying warmup on restart
      - /data/erebine/vllm-cache:/var/lib/inference/.cache/erebine/vllm
      # Persistent enrollment state
      - /data/erebine/config:/var/lib/inference/.config/erebine
    environment:
      # Agent Enrollment [REQUIRED for first run]
      EREBINE_AGENT_JOIN_KEY: "${EREBINE_AGENT_JOIN_KEY:-}"
      # ROCm GPU Configuration. Passed through from the host environment only
      # when set; left unset the HIP runtime exposes every GPU the container is
      # given. Do not default this to a single index: amd-smi enumerates GPUs
      # from the driver and ignores the mask, so the agent would auto-configure
      # a tensor-parallel size wider than the devices vLLM can actually see.
      HIP_VISIBLE_DEVICES:
      # Model is assigned from the dashboard during enrollment
      EREBINE_AGENT_MAX_MODEL_LEN: "${EREBINE_AGENT_MAX_MODEL_LEN:-}"
      # Left unset so auto-configuration derives tensor parallelism from the GPUs
      # the HIP runtime exposes. Defaulting it to a value pins it: AgentRuntime
      # treats any parseable value as an operator override and skips the derived
      # size. Passed through from the host environment when set, as an override.
      EREBINE_AGENT_TENSOR_PARALLEL_SIZE:
      EREBINE_AGENT_GPU_MEMORY_UTILIZATION: "${EREBINE_AGENT_GPU_MEMORY_UTILIZATION:-0.90}"
      EREBINE_AGENT_MAX_CONCURRENT: "${EREBINE_AGENT_MAX_CONCURRENT:-}"
      EREBINE_AGENT_LOG_LEVEL: "${EREBINE_AGENT_LOG_LEVEL:-info}"
    restart: unless-stopped
